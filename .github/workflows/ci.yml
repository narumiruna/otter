name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: otter_test
          POSTGRES_PASSWORD: otter_test_password
          POSTGRES_USER: otter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U otter -d otter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://otter:otter_test_password@127.0.0.1:5432/otter_test
      TEST_DATABASE_URL: postgres://otter:otter_test_password@127.0.0.1:5432/otter_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm run check
