services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: otter_dev
      POSTGRES_PASSWORD: otter_dev_password
      POSTGRES_USER: otter
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otter -d otter_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - otter-dev-postgres:/var/lib/postgresql/data

  otter-dev:
    build:
      context: .
      target: deps
    command: sh -c "npm run migrate && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://otter:otter_dev_password@postgres:5432/otter_dev
      DEV_ADMIN_EMAIL: admin@otter.local
      DEV_ADMIN_NAME: Admin
      DEV_ADMIN_PASSWORD: admin1234
      NODE_ENV: development
      PORT: 3420
    ports:
      - "3420:3420"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  otter-dev-postgres:
