services:
  otter-dev:
    build:
      context: .
      target: deps
    command: npm run dev
    environment:
      DATA_DIR: /data
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - otter-dev-data:/data

volumes:
  otter-dev-data:
